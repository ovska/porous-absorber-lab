<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Front Wall SBIR Lab</title>
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="icon" href="./site-icon.svg" type="image/svg+xml">
    <link rel="icon" href="./site-icon.png" type="image/png" sizes="512x512">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" sizes="180x180">
    <link rel="stylesheet" href="./styles.css?v=4">
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js" defer></script>
    <script src="./sbir.js?v=5" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <svg class="brand-icon" viewBox="0 0 1024 1024" width="44" height="44" aria-hidden="true" focusable="false">
            <defs>
              <linearGradient id="sbirBrandIconBg" x1="188" y1="102" x2="842" y2="940" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#176e69"/>
                <stop offset="0.55" stop-color="#123f3b"/>
                <stop offset="1" stop-color="#14251f"/>
              </linearGradient>
              <linearGradient id="sbirBrandIconSlab" x1="484" y1="206" x2="800" y2="822" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#fbfffc"/>
                <stop offset="1" stop-color="#dfe9e4"/>
              </linearGradient>
            </defs>
            <rect x="64" y="64" width="896" height="896" rx="184" fill="url(#sbirBrandIconBg)"/>
            <path d="M184 326 C246 280 312 296 388 244" fill="none" stroke="#d8eeee" stroke-width="44" stroke-linecap="round"/>
            <path d="M166 512 C238 462 318 534 402 470" fill="none" stroke="#efbd73" stroke-width="48" stroke-linecap="round"/>
            <path d="M184 692 C262 738 326 690 400 752" fill="none" stroke="#8bd8d4" stroke-width="40" stroke-linecap="round"/>
            <rect x="392" y="230" width="66" height="568" rx="33" fill="#b84d37"/>
            <rect x="476" y="202" width="352" height="620" rx="82" fill="#000000" opacity="0.18" transform="translate(16 18)"/>
            <rect x="476" y="202" width="352" height="620" rx="82" fill="url(#sbirBrandIconSlab)"/>
            <rect x="524" y="258" width="70" height="508" rx="35" fill="#d8eeee" opacity="0.72"/>
            <g fill="#116a68">
              <circle cx="620" cy="322" r="28"/>
              <circle cx="728" cy="322" r="24"/>
              <circle cx="620" cy="432" r="22"/>
              <circle cx="728" cy="432" r="29"/>
              <circle cx="620" cy="542" r="30"/>
              <circle cx="728" cy="542" r="22"/>
              <circle cx="620" cy="652" r="23"/>
              <circle cx="728" cy="652" r="28"/>
            </g>
            <g fill="#4b65a2" opacity="0.68">
              <circle cx="674" cy="376" r="16"/>
              <circle cx="674" cy="486" r="18"/>
              <circle cx="674" cy="596" r="16"/>
              <circle cx="674" cy="706" r="18"/>
            </g>
            <path d="M534 796 C604 842 740 844 808 782" fill="none" stroke="#b84d37" stroke-width="30" stroke-linecap="round"/>
          </svg>
          <div class="brand-copy">
            <nav class="tool-tabs" aria-label="Acoustics tools">
              <a class="tool-tab" href="./index.html">Absorbers</a>
              <a class="tool-tab" href="./sbir.html" aria-current="page">SBIR</a>
            </nav>
            <div class="title-with-info">
              <h1>Front Wall Speaker Boundary Interference Lab</h1>
              <button
                class="model-info"
                type="button"
                aria-label="Allard and Champoux 1992 absorber model with image-source SBIR"
                aria-expanded="false"
                data-tooltip="Allard &amp; Champoux (1992) absorber model with image-source SBIR."
              >i</button>
            </div>
          </div>
        </div>
        <div class="top-actions" aria-label="Global controls">
          <label class="switch-control">
            <input id="darkMode" type="checkbox">
            <span class="switch-track" aria-hidden="true"></span>
            <span>Dark mode</span>
          </label>
          <button id="resetAllButton" class="secondary-button" type="button">Reset all</button>
        </div>
      </header>

      <section class="workspace">
        <section class="chart-panel" aria-label="SBIR frequency response chart">
          <div id="chart"></div>
          <div class="chart-footer">
            <div class="chart-summary-row">
              <div id="chartStatus" class="chart-status" role="status"></div>
            </div>
            <div class="chart-status">
              Direct sound is the 0 dB reference · spherical 1/r path spreading · normal incidence · rigid backing · 20 °C
            </div>
          </div>
        </section>

        <aside class="control-panel" aria-label="SBIR controls">
          <div class="panel-heading">
            <div class="panel-title setup-title">
              <h2>Setup</h2>
              <div class="setup-info chart-status">
                <span id="driverDistance"></span>
                <span id="listenerWallDistance"></span>
              </div>
            </div>
          </div>

          <div class="absorber-list">
            <section class="absorber-card" aria-labelledby="geometryHeading">
              <div class="absorber-header">
                <span class="trace-swatch" style="background: var(--accent)" aria-hidden="true"></span>
                <strong id="geometryHeading">Speaker geometry</strong>
              </div>
              <div class="absorber-body">
                <label class="slider-field" for="cabinetDepth">
                  <span class="slider-label">
                    <span>Speaker cabinet depth</span>
                    <strong id="cabinetDepthValue"></strong>
                  </span>
                  <input id="cabinetDepth" type="range" min="100" max="1000" step="10">
                </label>

                <label class="slider-field" for="rearDistance">
                  <span class="slider-label">
                    <span>Speaker back to wall / absorber</span>
                    <strong id="rearDistanceValue"></strong>
                  </span>
                  <input id="rearDistance" type="range" min="0" max="2000" step="10">
                </label>

                <label class="slider-field" for="listenerDistance">
                  <span class="slider-label">
                    <span>Speaker front to listener</span>
                    <strong id="listenerDistanceValue"></strong>
                  </span>
                  <input id="listenerDistance" type="range" min="500" max="5000" step="100">
                </label>
              </div>
            </section>

            <section id="highPassCard" class="absorber-card" aria-labelledby="highPassHeading">
              <div class="absorber-header">
                <span class="trace-swatch" style="background: #4b65a2" aria-hidden="true"></span>
                <div class="absorber-title-row sbir-card-title-row">
                  <strong id="highPassHeading">Speaker high pass</strong>
                  <label class="switch-control">
                    <input id="highPassEnabled" type="checkbox" aria-label="Enable speaker high pass">
                    <span class="switch-track" aria-hidden="true"></span>
                    <span id="highPassEnabledLabel">On</span>
                  </label>
                </div>
              </div>
              <div class="absorber-body">
                <label class="slider-field" for="highPassFrequency">
                  <span class="slider-label">
                    <span>High-pass frequency</span>
                    <strong id="highPassFrequencyValue"></strong>
                  </span>
                  <input id="highPassFrequency" type="range" min="10" max="100" step="5">
                </label>

                <div class="chart-summary-row">
                  <label class="switch-control">
                    <input id="sealedSpeaker" type="checkbox" aria-label="Sealed speaker roll-off">
                    <span class="switch-track" aria-hidden="true"></span>
                    <span>Sealed speaker</span>
                  </label>
                  <span id="highPassSlope" class="chart-status"></span>
                </div>
              </div>
            </section>

            <section id="absorptionCard" class="absorber-card" aria-labelledby="absorptionHeading">
              <div class="absorber-header">
                <span class="trace-swatch" style="background: #b84d37" aria-hidden="true"></span>
                <div class="absorber-title-row sbir-card-title-row">
                  <strong id="absorptionHeading">Absorption behind speaker</strong>
                  <label class="switch-control">
                    <input id="absorptionEnabled" type="checkbox" aria-label="Enable absorption behind speaker">
                    <span class="switch-track" aria-hidden="true"></span>
                    <span id="absorptionEnabledLabel">Off</span>
                  </label>
                </div>
              </div>
              <div class="absorber-body">
                <label class="slider-field" for="flowResistivity">
                  <span class="slider-label">
                    <span>Gas flow resistivity (GFR)</span>
                    <strong id="flowResistivityValue"></strong>
                  </span>
                  <input id="flowResistivity" type="range" min="1000" max="50000" step="500">
                </label>

                <label class="slider-field" for="absorberDepth">
                  <span class="slider-label">
                    <span>Absorber depth</span>
                    <strong id="absorberDepthValue"></strong>
                  </span>
                  <input id="absorberDepth" type="range" min="0" max="500" step="10">
                </label>

                <label class="slider-field" for="airGap">
                  <span class="slider-label">
                    <span>Air gap behind absorber</span>
                    <strong id="airGapValue"></strong>
                  </span>
                  <input id="airGap" type="range" min="0" max="500" step="10">
                </label>
              </div>
            </section>
          </div>
        </aside>
      </section>
    </main>
  </body>
</html>
